services:
  db:
    image: postgres:16
    container_name: retail_demo_pg
    environment:
      POSTGRES_USER: analyst
      POSTGRES_PASSWORD: analyst
      POSTGRES_DB: retail_demo
    ports:
      - "5433:5432"
    volumes:
      - ./sql/00_schema.sql:/docker-entrypoint-initdb.d/00_schema.sql:ro
      - ./data:/data:ro
      - ./exports:/exports
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analyst -d retail_demo"]
      interval: 5s
      timeout: 5s
      retries: 20
